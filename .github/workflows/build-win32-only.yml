name: Build Thalixte ReShade 32-bit Only

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Fix Windows SDK version to auto-select
      shell: powershell
      run: |
        Get-ChildItem -Recurse -Filter "*.vcxproj" | ForEach-Object {
          $content = Get-Content $_.FullName -Raw
          $original = $content
          # 替换为 "10.0" 表示使用最新可用版本
          $content = $content -replace '<WindowsTargetPlatformVersion>10\.0\.\d+\.\d+</WindowsTargetPlatformVersion>', '<WindowsTargetPlatformVersion>10.0</WindowsTargetPlatformVersion>'
          if ($content -ne $original) {
            Set-Content $_.FullName $content -NoNewline
            Write-Host "Fixed: $($_.Name)"
          }
        }

    - name: Create dummy gl3w_gen.py
      shell: cmd
      run: |
        echo import sys > deps/gl3w/gl3w_gen.py
        echo print("gl3w_gen.py skipped") >> deps/gl3w/gl3w_gen.py
        echo sys.exit(0) >> deps/gl3w/gl3w_gen.py

    - name: Build ReShade 32-bit
      shell: cmd
      run: |
        msbuild ReShade.sln ^
          /p:Configuration=Release ^
          /p:Platform="32-bit" ^
          /p:PlatformToolset=v143 ^
          /t:"ReShade";"ReShade FX";"gl3w";"ImGui";"MinHook";"stb";"FXC";"Injector" ^
          /m ^
          /verbosity:minimal

    - name: Collect 32-bit DLLs
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "output_32bit"
        
        $paths = @(
          "bin\32-bit\Release\ReShade32.dll",
          "bin\Win32\Release\ReShade32.dll",
          "bin\Release\Win32\ReShade32.dll"
        )
        
        foreach ($p in $paths) {
          if (Test-Path $p) {
            Copy-Item $p "output_32bit\"
            Write-Host "Found: $p"
          }
        }
        
        if (-not (Test-Path "output_32bit\ReShade32.dll")) {
          Get-ChildItem -Path "bin" -Recurse | Select-Object FullName
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Thalixte-ReShade-32bit
        path: output_32bit/
        retention-days: 30
