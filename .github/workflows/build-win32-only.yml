name: Build Thalixte ReShade 32-bit Only (No OpenGL)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build ReShade 32-bit (No OpenGL)
      shell: cmd
      run: |
        msbuild ReShade.sln ^
          /p:Configuration=Release ^
          /p:Platform="32-bit" ^
          /p:WindowsTargetPlatformVersion=10.0.22000.0 ^
          /p:PlatformToolset=v143 ^
          /p:RESHADE_NO_OPENGL=1 ^
          /t:"ReShade";"ReShade FX";"ImGui";"MinHook";"stb";"FXC";"Injector" ^
          /m ^
          /verbosity:minimal

    - name: Collect 32-bit DLLs
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "output_32bit"
        
        $paths = @(
          "bin\32-bit\Release\ReShade32.dll",
          "bin\Win32\Release\ReShade32.dll",
          "bin\Release\Win32\ReShade32.dll"
        )
        
        foreach ($p in $paths) {
          if (Test-Path $p) {
            Copy-Item $p "output_32bit\"
            Write-Host "Found: $p"
          }
        }
        
        if (-not (Test-Path "output_32bit\ReShade32.dll")) {
          Get-ChildItem -Path "bin" -Recurse | Select-Object FullName
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Thalixte-ReShade-32bit-NoGL
        path: output_32bit/
        retention-days: 30

    - name: Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: win32-nogl-build-${{ github.run_number }}
        name: Thalixte ReShade 32-bit (No OpenGL) Build ${{ github.run_number }}
        files: output_32bit/*
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
