jobs:
  build:
    runs-on: windows-latest  # 改回来
    
    steps:
    # ... 其他步骤不变 ...
    
    - name: Build ReShade 32-bit
      shell: cmd
      run: |
        msbuild ReShade.sln ^
          /p:Configuration=Release ^
          /p:Platform="32-bit" ^
          /p:WindowsTargetPlatformVersion=10.0.22000.0 ^  :: 强制使用 Win11 SDK
          /p:PlatformToolset=v143 ^  :: 使用 VS2022 工具集
          /t:"ReShade";"ReShade FX";"gl3w";"ImGui";"MinHook";"stb";"FXC";"Injector" ^
          /m
