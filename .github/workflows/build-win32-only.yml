name: Build Thalixte ReShade 32-bit Only

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Remove gl3w submodule and create dummy files
      shell: cmd
      run: |
        rmdir /s /q deps\gl3w
        mkdir deps\gl3w\src
        mkdir deps\gl3w\include\GL
        echo // Dummy > deps\gl3w\src\gl3w.c
        echo #include ^<windows.h^> > deps\gl3w\include\GL\gl3w.h
        echo typedef unsigned int GLenum; >> deps\gl3w\include\GL\gl3w.h
        echo typedef unsigned int GLuint; >> deps\gl3w\include\GL\gl3w.h
        echo int gl3wInit(void) { return 0; } >> deps\gl3w\src\gl3w.c
        echo import sys > deps\gl3w\gl3w_gen.py
        echo sys.exit(0) >> deps\gl3w\gl3w_gen.py

    - name: Fix vcxproj files (Remove SDK restriction and D3D12)
      shell: powershell
      run: |
        Get-ChildItem -Recurse -Filter "*.vcxproj" | ForEach-Object {
          [xml]$xml = Get-Content $_.FullName
          $modified = $false
          
          # 1. 删除 WindowsTargetPlatformVersion 节点
          $sdkNodes = $xml.SelectNodes("//WindowsTargetPlatformVersion")
          foreach ($node in $sdkNodes) {
            $node.ParentNode.RemoveChild($node)
            $modified = $true
          }
          
          # 2. 删除所有 D3D12 相关的 ClCompile 和 ClInclude
          $items = $xml.SelectNodes("//ClCompile[contains(@Include, 'd3d12')] | //ClInclude[contains(@Include, 'd3d12')]")
          foreach ($item in $items) {
            $item.ParentNode.RemoveChild($item)
            $modified = $true
            Write-Host "Removed D3D12 item: $($item.Include) from $($_.Name)"
          }
          
          # 3. 添加 D3D12 禁用宏定义
          $groups = $xml.SelectNodes("//ItemDefinitionGroup[not(@Condition) or contains(@Condition, 'Release') or contains(@Condition, '32-bit')]")
          foreach ($group in $groups) {
            if ($group.ClCompile -eq $null) {
              $clCompile = $xml.CreateElement("ClCompile")
              $group.AppendChild($clCompile)
            }
            $preprocessor = $group.ClCompile.PreprocessorDefinitions
            if ($preprocessor -eq $null) {
              $preprocessor = $xml.CreateElement("PreprocessorDefinitions")
              $group.ClCompile.AppendChild($preprocessor)
            }
            $preprocessor.InnerText = "RESHADE_NO_D3D12;RESHADE_NO_D3D12ON7;%(PreprocessorDefinitions)"
            $modified = $true
          }
          
          if ($modified) {
            $xml.Save($_.FullName)
            Write-Host "Updated: $($_.Name)"
          }
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build ReShade 32-bit
      shell: cmd
      run: |
        msbuild ReShade.sln ^
          /p:Configuration=Release ^
          /p:Platform="32-bit" ^
          /p:PlatformToolset=v143 ^
          /p:PreprocessorDefinitions=RESHADE_NO_D3D12 ^
          /t:"ReShade";"ReShade FX";"gl3w";"ImGui";"MinHook";"stb";"FXC";"Injector" ^
          /m

    - name: Collect 32-bit DLLs
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "output_32bit"
        $paths = @("bin\Win32\Release\ReShade32.dll","bin\32-bit\Release\ReShade32.dll","bin\Release\Win32\ReShade32.dll")
        foreach ($p in $paths) {
          if (Test-Path $p) {
            Copy-Item $p "output_32bit\"
            Write-Host "Found: $p"
          }
        }
        if (-not (Test-Path "output_32bit\ReShade32.dll")) {
          Get-ChildItem -Path "bin" -Recurse | Select-Object FullName
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Thalixte-ReShade-32bit
        path: output_32bit/
        retention-days: 30
