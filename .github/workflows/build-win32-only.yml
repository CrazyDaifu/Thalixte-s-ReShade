name: Build Thalixte ReShade 32-bit Only

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Remove gl3w submodule and create dummy files
      shell: cmd
      run: |
        rmdir /s /q deps\gl3w
        mkdir deps\gl3w\src
        mkdir deps\gl3w\include\GL
        echo // Dummy > deps\gl3w\src\gl3w.c
        echo #include ^<windows.h^> > deps\gl3w\include\GL\gl3w.h
        echo typedef unsigned int GLenum; >> deps\gl3w\include\GL\gl3w.h
        echo typedef unsigned int GLuint; >> deps\gl3w\include\GL\gl3w.h
        echo int gl3wInit(void) { return 0; } >> deps\gl3w\src\gl3w.c
        echo import sys > deps\gl3w\gl3w_gen.py
        echo sys.exit(0) >> deps\gl3w\gl3w_gen.py

    - name: Fix vcxproj files (Remove SDK and D3D12)
      shell: powershell
      run: |
        Get-ChildItem -Recurse -Filter "*.vcxproj" | ForEach-Object {
          $content = Get-Content $_.FullName -Raw
          $modified = $false
          
          # 1. 删除 WindowsTargetPlatformVersion 行（包括 Global 和 Configuration）
          if ($content -match '<WindowsTargetPlatformVersion>[^<]+</WindowsTargetPlatformVersion>') {
            $content = $content -replace '<WindowsTargetPlatformVersion>[^<]+</WindowsTargetPlatformVersion>\s*', ''
            $modified = $true
          }
          
          # 2. 删除 D3D12 文件引用（包括 d3d12 和 dxgi 中可能包含 D3D12 的部分）
          # 先移除 d3d12 目录下的所有文件
          if ($content -match 'Include="source\\d3d12\\[^"]*"') {
            $content = $content -replace '<ClCompile Include="source\\d3d12\\[^"]*"\s*/?>\s*', ''
            $content = $content -replace '<ClInclude Include="source\\d3d12\\[^"]*"\s*/?>\s*', ''
            $modified = $true
          }
          
          # 3. 添加 NO_D3D12 宏到所有 PreprocessorDefinitions
          if ($content -match '<PreprocessorDefinitions>') {
            $content = $content -replace '(<PreprocessorDefinitions>)([^<]*)(</PreprocessorDefinitions>)', '$1RESHADE_NO_D3D12;RESHADE_NO_D3D12ON7;$2$3'
            $modified = $true
          }
          
          if ($modified) {
            Set-Content $_.FullName $content -NoNewline
            Write-Host "Fixed: $($_.Name)"
          }
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build ReShade 32-bit
      shell: cmd
      run: |
        msbuild ReShade.sln ^
          /p:Configuration=Release ^
          /p:Platform="32-bit" ^
          /p:PlatformToolset=v143 ^
          /p:PreprocessorDefinitions=RESHADE_NO_D3D12 ^
          /t:"ReShade";"ReShade FX";"gl3w";"ImGui";"MinHook";"stb";"FXC";"Injector" ^
          /m

    - name: Collect 32-bit DLLs
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "output_32bit"
        $paths = @("bin\Win32\Release\ReShade32.dll","bin\32-bit\Release\ReShade32.dll","bin\Release\Win32\ReShade32.dll")
        foreach ($p in $paths) {
          if (Test-Path $p) {
            Copy-Item $p "output_32bit\"
            Write-Host "Found: $p"
          }
        }
        if (-not (Test-Path "output_32bit\ReShade32.dll")) {
          Get-ChildItem -Path "bin" -Recurse | Select-Object FullName
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Thalixte-ReShade-32bit
        path: output_32bit/
        retention-days: 30
