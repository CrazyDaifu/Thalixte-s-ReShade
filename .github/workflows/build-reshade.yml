name: Build Thalixte ReShade 4.9.1 Full DLLs
on:
  workflow_dispatch: # 推荐手动触发，避免无效编译
  push:
    branches: [ master ]

jobs:
  build-reshade:
    runs-on: windows-2022
    defaults:
      run:
        shell: powershell
        working-directory: ${{ github.workspace }} # 强制锁定仓库根目录为工作目录，解决找不到CMakeLists.txt的问题
    steps:
      # 步骤1：拉取完整源码+递归拉取子模块（必须，否则依赖库缺失）
      - name: Checkout Full Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 步骤2：配置MSVC编译环境（适配VS2022+兼容老版本工具集）
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          vsversion: 2022
          toolset: 14.29 # 兼容Thalixte 4.9.1的VS2019工具集
          arch: x86,x64

      # 步骤3：配置CMake环境
      - name: Setup CMake
        uses: lukka/get-cmake@v3.30.0

      # 步骤4：编译32位版本（起源引擎/L4D2核心）
      - name: Configure & Build 32-bit Release
        run: |
          # 单独创建32位构建目录，避免和64位冲突
          New-Item -ItemType Directory -Force -Path build32
          Set-Location build32
          
          # 32位CMake配置（反引号后绝对不能有空格！！）
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A Win32 `
            -DCMAKE_BUILD_TYPE=Release `
            -DRESHADE_BUILD_SETUP=OFF `
            -DRESHADE_BUILD_D3D9=ON `
            -DRESHADE_BUILD_D3D10=ON `
            -DRESHADE_BUILD_D3D11=ON `
            -DRESHADE_BUILD_D3D12=ON `
            -DRESHADE_BUILD_OPENGL=ON `
            -DRESHADE_BUILD_VULKAN=ON
          
          # 执行32位编译
          cmake --build . --config Release --target ALL_BUILD -j 8

      # 步骤5：编译64位版本
      - name: Configure & Build 64-bit Release
        run: |
          # 单独创建64位构建目录
          New-Item -ItemType Directory -Force -Path build64
          Set-Location build64
          
          # 64位CMake配置
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DRESHADE_BUILD_SETUP=OFF `
            -DRESHADE_BUILD_D3D9=ON `
            -DRESHADE_BUILD_D3D10=ON `
            -DRESHADE_BUILD_D3D11=ON `
            -DRESHADE_BUILD_D3D12=ON `
            -DRESHADE_BUILD_OPENGL=ON `
            -DRESHADE_BUILD_VULKAN=ON
          
          # 执行64位编译
          cmake --build . --config Release --target ALL_BUILD -j 8

      # 步骤6：整理编译产物，分类打包
      - name: Organize Build Artifacts
        run: |
          # 创建输出目录
          $outputRoot = "Thalixte_ReShade_4.9.1_Full_DLLs"
          New-Item -ItemType Directory -Force -Path "$outputRoot/32bit"
          New-Item -ItemType Directory -Force -Path "$outputRoot/64bit"
          
          # 复制32位所有DLL
          Copy-Item -Path "build32/Release/*.dll" -Destination "$outputRoot/32bit/" -Force
          # 复制64位所有DLL
          Copy-Item -Path "build64/Release/*.dll" -Destination "$outputRoot/64bit/" -Force
          
          # 输出文件清单，验证编译结果
          Write-Host "===== 32位编译产物 ====="
          Get-ChildItem "$outputRoot/32bit"
          Write-Host "===== 64位编译产物 ====="
          Get-ChildItem "$outputRoot/64bit"

      # 步骤7：上传可下载的压缩包
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Thalixte_ReShade_4.9.1_Full_DLLs
          path: Thalixte_ReShade_4.9.1_Full_DLLs/
          retention-days: 90  
